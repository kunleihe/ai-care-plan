services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: careplan
      POSTGRES_USER: careplan
      POSTGRES_PASSWORD: careplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A careplan worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./app:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
